version: "3.9"

services:

  keycloak:
    image: quay.io/keycloak/keycloak:25.0.0
    container_name: keycloak
    command:
      - start-dev
      - -Dkeycloak.migration.strategy=OVERWRITE_EXISTING
      - --import-realm
    environment:
      KC_HEALTH_ENABLED: "true"
      KC_DB: dev-file
      # Fix hostname to match how we access it
      KC_HOSTNAME: keycloak
      # Remove strict hostname checking for development
      KC_HOSTNAME_STRICT: "false"
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin
      KC_LOG_LEVEL: DEBUG # DEBUG, INFO, TRACE
      KC_HTTP_ENABLED: "true"

      ##############################
      # Uncomment for production ready
      # KEYCLOAK_PRODUCTION: "true"
      # KC_PROXY_HEADERS: "xforwarded"
      # KC_PROXY: "edge"
      # Disable SSL for development
      ##############################
    volumes:
      - ./keycloak/realm-export.json:/opt/keycloak/data/import/realm.json:ro
      # Remove SSL certificates for now to avoid issues
      # - ./keycloak/server.crt.pem:/opt/keycloak/conf/server.crt.pem
      # - ./keycloak/server.key.pem:/opt/keycloak/conf/server.key.pem
    ports:
      - "8081:8080"
      - "9000:9000"
      # Remove HTTPS port for development
      # - "8443:8443"
    networks:
      - app-net
    healthcheck:
      test: [ "CMD-SHELL", "{ printf 'HEAD /health/ready HTTP/1.0\r\n\r\n' >&0; grep 'HTTP/1.0 200'; } 0<>/dev/tcp/localhost/9000" ]
      interval: 5s
      retries: 5
      start_period: 30s
      timeout: 10s

  spring-app:
    build:
      context: clean-archi
    container_name: spring-bff
    depends_on:
      keycloak:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: docker
      # This tells Spring to look for application.yml in /config directory (mounted from host)
      SPRING_CONFIG_LOCATION: file:/config/
      SPRING_SECURITY_OAUTH2_CLIENT_PROVIDER_KEYCLOAK_ISSUER_URI: http://keycloak:8080/realms/my-realm
      SPRING_SECURITY_OAUTH2_CLIENT_REGISTRATION_KEYCLOAK_REDIRECT_URI: http://spring-app:8080/login/oauth2/code/keycloak
      SPRING_SECURITY_OAUTH2_CLIENT_REGISTRATION_KEYCLOAK_CLIENT_ID: bff-client
      SPRING_SECURITY_OAUTH2_CLIENT_REGISTRATION_KEYCLOAK_CLIENT_SECRET: bff-secret
    volumes:
      # Mount the application config file from host so changes are reflected without rebuild
      - ./clean-archi/app/src/main/resources/application-docker.yml:/config/application.yml
    ports:
      - "8080:8080"
    networks:
      - app-net

networks:
  app-net:
    driver: bridge